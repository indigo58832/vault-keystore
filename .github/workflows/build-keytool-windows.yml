name: Build KeyTool Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pyqt5

      - name: Build KeyTool.exe
        shell: bash
        working-directory: packaging/keytool
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name KeyTool app_win.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeyTool-windows
          path: packaging/keytool/dist/KeyTool.exe
