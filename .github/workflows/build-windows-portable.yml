name: Build Windows portable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller PyQt6 requests pynput urllib3 pillow

      - name: Build app icon
        shell: bash
        run: |
          python - <<'PY'
          from PIL import Image
          img = Image.open("keystore/icons/logos/logo1_v_minimal.png").convert("RGBA")
          img.save("vault.ico", sizes=[(256, 256), (128, 128), (64, 64), (32, 32), (16, 16)])
          PY

      - name: Build Vault.exe
        shell: bash
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --onefile \
            --name Vault \
            --icon vault.ico \
            --paths . \
            --hidden-import pynput.keyboard._win32 \
            --hidden-import pynput.mouse._win32 \
            --hidden-import winkeycheck.check \
            --hidden-import winkeycheck.keycheck \
            --hidden-import winkeycheck.server \
            --add-data "keystore/icons;icons" \
            --add-data "winkeycheck/pidgenx;winkeycheck/pidgenx" \
            --add-data "winkeycheck/licensing_stuff;winkeycheck/licensing_stuff" \
            --add-data "winkeycheck/pkeyconfig.xrm-ms;winkeycheck" \
            vault_launcher.py

      - name: Assemble portable bundle
        shell: bash
        run: |
          mkdir -p out/VaultPortable
          cp dist/Vault.exe out/VaultPortable/
          cp packaging/windows/Start\ Vault.bat out/VaultPortable/
          cp packaging/windows/Stop\ Vault.bat out/VaultPortable/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VaultPortable-windows
          path: out/VaultPortable
