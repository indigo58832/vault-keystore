name: Build Windows portable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller PyQt6 requests pynput urllib3 pillow

      - name: Build app icon
        shell: bash
        run: |
          python - <<'PY'
          from PIL import Image
          img = Image.open("keystore/icons/logos/logo1_v_minimal.png").convert("RGBA")
          img.save("vault.ico", sizes=[(256, 256), (128, 128), (64, 64), (32, 32), (16, 16)])
          PY
          echo "build=${GITHUB_RUN_ID}-${GITHUB_SHA::7}" > vault_build.txt

      - name: Build Vault (onedir — быстрый старт, без onefile)
        shell: bash
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --onedir \
            --name Vault \
            --icon vault.ico \
            --paths keystore \
            --paths . \
            --hidden-import pynput.keyboard._win32 \
            --hidden-import pynput.mouse._win32 \
            --collect-submodules keystore \
            --collect-submodules winkeycheck \
            --collect-all PyQt6 \
            --add-data "keystore/icons;icons" \
            --add-data "winkeycheck/pidgenx;pidgenx" \
            --add-data "winkeycheck/licensing_stuff;licensing_stuff" \
            --add-data "winkeycheck/pkeyconfig.xrm-ms;." \
            --add-data "vault_build.txt;." \
            vault_app_entry.py

      - name: Smoke test pkeyconfigs in Vault.exe
        shell: bash
        run: |
          ./dist/Vault/Vault.exe --self-test-pkeyconfigs

      - name: Assemble portable bundle
        shell: bash
        run: |
          mkdir -p out/VaultPortable
          cp -r dist/Vault/. out/VaultPortable/
          cp packaging/windows/README.txt out/VaultPortable/
          cp packaging/windows/Diagnose.bat out/VaultPortable/
          cp packaging/windows/Start\ Vault.bat out/VaultPortable/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VaultPortable-windows
          path: out/VaultPortable
