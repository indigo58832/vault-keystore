name: Build Windows portable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller PyQt6 requests pynput urllib3 pillow

      - name: Build app icon
        shell: bash
        run: |
          python - <<'PY'
          from PIL import Image
          img = Image.open("keystore/icons/logos/logo1_v_minimal.png").convert("RGBA")
          img.save("vault.ico", sizes=[(256, 256), (128, 128), (64, 64), (32, 32), (16, 16)])
          PY

      - name: Build Vault.exe
        shell: bash
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --onefile \
            --name Vault \
            --icon vault.ico \
            --paths keystore \
            --paths . \
            --hidden-import pynput.keyboard._win32 \
            --hidden-import pynput.mouse._win32 \
            --collect-submodules keystore \
            --add-data "keystore/icons;icons" \
            vault_app_entry.py

      - name: Build KeyCheckerServer.exe
        shell: bash
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --console \
            --onefile \
            --name KeyCheckerServer \
            --paths . \
            --collect-submodules winkeycheck \
            --add-data "winkeycheck/pidgenx;pidgenx" \
            --add-data "winkeycheck/licensing_stuff;licensing_stuff" \
            --add-data "winkeycheck/pkeyconfig.xrm-ms;." \
            server_entry.py

      - name: Build VaultLauncher.exe
        shell: bash
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --onefile \
            --name VaultLauncher \
            --icon vault.ico \
            launcher_entry.py

      - name: Assemble portable bundle
        shell: bash
        run: |
          mkdir -p out/VaultPortable
          cp dist/VaultLauncher.exe out/VaultPortable/
          cp dist/Vault.exe out/VaultPortable/
          cp dist/KeyCheckerServer.exe out/VaultPortable/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VaultPortable-windows
          path: out/VaultPortable
